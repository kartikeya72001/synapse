name: synapse
description: "Your second brain. Save, classify, and query anything you find."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Local database
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  
  # State management
  provider: ^6.1.4
  
  # Share target (receive shared content)
  receive_sharing_intent: ^1.8.1
  
  # HTTP client
  http: ^1.3.0
  
  # Image handling
  image_picker: ^1.1.2
  
  # URL launcher
  url_launcher: ^6.3.1
  
  # Shared preferences for settings
  shared_preferences: ^2.3.5
  
  # UUID generation
  uuid: ^4.5.1
  
  # Time formatting
  timeago: ^3.7.0
  
  # Cached network images
  cached_network_image: ^3.4.1
  
  # Google Fonts
  google_fonts: ^6.2.1
  
  # Animations
  flutter_staggered_animations: ^1.1.1
  
  # Shimmer loading
  shimmer: ^3.0.0
  
  # Encryption for secret manager
  encrypt: ^5.0.3
  
  # Biometric auth
  local_auth: ^2.3.0
  
  # Secure storage (keys stored in Android Keystore)
  flutter_secure_storage: ^9.2.4
  
  # Rich link previews (OG metadata)
  any_link_preview: ^3.0.2
  
  # Local OCR via Google ML Kit
  google_mlkit_text_recognition: ^0.14.0
  
  # EXIF metadata reading
  exif: ^3.3.0
  flutter_markdown: ^0.7.7+1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
